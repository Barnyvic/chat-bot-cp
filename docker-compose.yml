services:
  backend:
    build:
      context: ./backend
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY}
      LLM_MODEL: ${LLM_MODEL:-llama-3.3-70b-versatile}
      MCP_SERVER_URL: ${MCP_SERVER_URL:-https://order-mcp-74afyau24q-uc.a.run.app/mcp}
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_BACKEND_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
